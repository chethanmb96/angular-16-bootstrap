<section class="card">
  <div class="card-header">
    <h2 class="h5 mb-0">Products</h2>
  </div>

  <div class="table-responsive" *ngIf="products?.length; else emptyState">
    <table class="table table-striped table-hover align-middle mb-0">
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Description</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let product of products; trackBy: trackByProductId"
          [class.table-warning]="product.id === selectedProductId"
        >
          <td>
            <strong>{{ product.name }}</strong>
          </td>
          <td>{{ product.category }}</td>
          <td>{{ product.price | currency }}</td>
          <td>{{ product.stock }}</td>
          <td>{{ product.description }}</td>
          <td>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-primary" type="button" (click)="edit.emit(product)">Edit</button>
              <button class="btn btn-sm btn-outline-danger" type="button" (click)="delete.emit(product.id)">Delete</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #emptyState>
    <div class="card-body">
      No products found.
    </div>
  </ng-template>
</section>
